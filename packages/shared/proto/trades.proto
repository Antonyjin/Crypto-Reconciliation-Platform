syntax = "proto3";

package trade;

message TradeRequest {
    string external_id = 1;
    string exchange = 2;
    string base_asset = 3;
    string quote_asset = 4;
    string side = 5;
    string amount = 6;
    string price = 7;
    optional string fee = 8;
    optional string fee_asset = 9;
}

message TradeResponse {
    string id = 1;
    string external_id = 2;
    string exchange = 3;
    string base_asset = 4;
    string quote_asset = 5;
    string side = 6;
    string amount = 7;
    string price = 8;
    optional string fee = 9;
    optional string fee_asset = 10;
    string timestamp = 11;
    string created_at = 12;
}

service TradeService {
    rpc UpsertTrade(TradeRequest) returns (TradeResponse);
}